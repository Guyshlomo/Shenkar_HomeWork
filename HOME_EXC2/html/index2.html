<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scentify</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/index2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abel&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abel&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

</head>
<body>
    <header class="header wrapper">
        <div class="logo_container">
            <img class="logo" src="../Imges/logo.png" alt="logo">
            <h1 class="logo_text">Scentify</h1>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a id="our_scents" href="#">Our Scents</a>
            <a href="#">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <main>
        <div class="scents_cards" >
            <div class="scents_card">
                <img src="../Imges/card1.png" alt="image_card">
            </div>
            <div class="scents_card">
                <img src="../Imges/card2.png" alt="image_card">
            </div>
            <div class="scents_card">
                <img src="../Imges/card3.png" alt="image_card">
            </div>
        </div>
        <section class="list">
            <h2>List of Scents</h2>
            <ul>
                <li>Lavender</li>
                <li>Black Pepper</li>
                <li>Pure Calm Diffuser</li>
                <li>Citrus Breeze Room Spray</li>
            </ul>
        </section>
        <section class="MyChoice">
            <h2>Best Seller</h2>
            <video class="MyChoice_video" autoplay loop muted playsinline>
                <source src="../video/candle.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </section>
    </main> 
    <footer id="contact" class="footer">
        <div class="footer-content wrapper">
            <div class="who_we_are">
                <h3>Who we are</h3>
                <div class="footer_links">
                    <a href="#">About</a>
                    <a href="#">Our Team</a>
                    <a href="#">Work with us</a>
                </div>
                <div class="social_media">
                    <a href="http://www.facebook.com/ "><img src="../Imges/facebook.png" alt="facebook"></a>
                    <a href="https://www.instagram.com/ "><img src="../Imges/instagram.png" alt="instagram"></a>
                    <a href="https://www.twitter.com/ "><img src="../Imges/twitter.png" alt="twitter"></a>
                </div>
                <p class="copyright">© 2026 SCENTIFY</p>
            </div>
            <div class="follow_us">
                <h3>Follow us</h3>
                <div class="footer_links">
                    <a href="https://www.facebook.com/" target="_blank">Facebook</a>
                    <a href="https://www.instagram.com/" target="_blank">Instagram</a>
                    <a href="https://www.twitter.com/" target="_blank">Twitter</a>
                </div>
            </div>
        </div>
    </footer>

</html>
